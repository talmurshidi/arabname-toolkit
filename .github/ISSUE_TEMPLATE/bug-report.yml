name: Bug report
description: Report something that's broken.
title: '[Bug] '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        For an incorrect Arabic conversion, use the **Transliteration accuracy** template instead
        — it captures the fields needed to verify and fix it (input, actual/expected output, and
        a citable source).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: e.g. Chrome 126 on macOS 14
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else relevant.
    validations:
      required: false
